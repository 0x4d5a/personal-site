name: Site CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: site-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Validate static site
        run: python3 scripts/validate_site.py
